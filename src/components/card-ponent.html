<article class="card-ponent flex-1 basis-[250px] max-w-[400px] transition-all duration-300 ease-in-out hover:-translate-y-2 hover:shadow-2xl hover:shadow-black/40">

  <div class="w-full h-[260px] overflow-hidden rounded-lg bg-stone-900 flex items-center justify-center">
    <img src="{{ foto }}" alt="{{ nom }}" class="w-full h-full object-cover object-top block">
  </div>

  <div class="w-full flex flex-col items-center justify-between flex-grow gap-4 pt-2">
    <div>
      <div class="text-white font-serif font-bold text-xl mb-2">{{ nom }}</div>
      <p class="text-brand-secondary font-semibold text-xs uppercase tracking-wider px-2">
        "{{ descripcio }}"
      </p>
    </div>

    <div class="w-full pt-2">
      <include src="components/btn-brand.html">
        { "text": "Saber-ne més", "modalId": "{{ modalId }}" }
      </include>
    </div>
  </div>

</article>
